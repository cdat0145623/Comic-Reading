<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Demo xác minh email - Mê Truyện Chữ</title>
        <style>
            :root {
                --page: #f3f4f6;
                --surface: #ffffff;
                --surface-soft: #f8f7f3;
                --ink: #202632;
                --muted: #697181;
                --line: #dfe3e8;
                --primary: #b78a27;
                --primary-dark: #8f6814;
                --success: #217a4b;
                --success-soft: #edf8f1;
                --danger: #c33c35;
                --danger-soft: #fff2f0;
                --focus: #2563eb;
                font-family: "Avenir Next", Avenir, Arial, sans-serif;
            }

            * {
                box-sizing: border-box;
                letter-spacing: 0;
            }

            body {
                margin: 0;
                min-width: 320px;
                min-height: 100dvh;
                color: var(--ink);
                background: var(--page);
            }

            button,
            input {
                font: inherit;
            }

            button {
                cursor: pointer;
            }

            .site-header {
                position: sticky;
                top: 0;
                z-index: 10;
                height: 72px;
                border-bottom: 1px solid var(--line);
                background: rgba(255, 255, 255, 0.96);
            }

            .header-inner {
                width: min(1120px, calc(100% - 40px));
                height: 100%;
                margin: 0 auto;
                display: grid;
                grid-template-columns: 1fr auto 1fr;
                align-items: center;
            }

            .icon-button {
                width: 42px;
                height: 42px;
                display: inline-grid;
                place-items: center;
                border: 1px solid transparent;
                background: transparent;
                color: var(--ink);
            }

            .icon-button:hover {
                border-color: var(--line);
                background: var(--surface-soft);
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 10px;
                font-weight: 800;
                text-transform: uppercase;
            }

            .brand-mark {
                width: 42px;
                height: 34px;
                display: grid;
                place-items: center;
                color: white;
                background: var(--primary);
                border: 2px solid var(--ink);
                transform: skew(-8deg);
            }

            .brand-mark span {
                transform: skew(8deg);
            }

            .header-action {
                justify-self: end;
                color: var(--muted);
                font-size: 14px;
                text-decoration: none;
            }

            .demo-switcher {
                width: min(720px, calc(100% - 32px));
                margin: 28px auto 0;
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
                padding: 6px;
                border: 1px solid var(--line);
                background: var(--surface);
            }

            .demo-switcher button {
                min-height: 42px;
                border: 1px solid transparent;
                background: transparent;
                color: var(--muted);
                font-weight: 700;
            }

            .demo-switcher button[aria-selected="true"] {
                border-color: var(--line);
                color: var(--primary-dark);
                background: var(--surface-soft);
            }

            main {
                min-height: calc(100dvh - 148px);
                display: grid;
                place-items: center;
                padding: 44px 20px 80px;
            }

            .auth-shell {
                width: min(920px, 100%);
                display: grid;
                grid-template-columns: minmax(220px, 0.72fr) minmax(380px, 1.28fr);
                border: 1px solid var(--line);
                background: var(--surface);
                box-shadow: 0 22px 60px rgba(32, 38, 50, 0.1);
                overflow: hidden;
            }

            .context-panel {
                padding: 46px 36px;
                border-right: 1px solid var(--line);
                background: var(--surface-soft);
            }

            .context-label {
                margin: 0 0 24px;
                color: var(--primary-dark);
                font-size: 12px;
                font-weight: 800;
                text-transform: uppercase;
            }

            .context-panel h2 {
                max-width: 12ch;
                margin: 0;
                font-size: clamp(28px, 4vw, 42px);
                line-height: 1.08;
            }

            .context-panel p {
                max-width: 30ch;
                margin: 20px 0 0;
                color: var(--muted);
                line-height: 1.7;
            }

            .security-note {
                margin-top: 44px;
                padding-top: 18px;
                border-top: 1px solid var(--line);
                color: var(--muted);
                font-size: 13px;
                line-height: 1.6;
            }

            .status-panel {
                min-height: 480px;
                padding: 56px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .status-icon {
                width: 58px;
                height: 58px;
                display: grid;
                place-items: center;
                margin-bottom: 26px;
                border: 1px solid var(--line);
                color: var(--primary-dark);
                background: var(--surface-soft);
            }

            .status-panel[data-state="success"] .status-icon {
                color: var(--success);
                border-color: #b8ddc7;
                background: var(--success-soft);
            }

            .status-panel[data-state="error"] .status-icon {
                color: var(--danger);
                border-color: #efbbb6;
                background: var(--danger-soft);
            }

            .status-panel h1 {
                margin: 0;
                font-size: clamp(30px, 4vw, 46px);
                line-height: 1.12;
            }

            .status-copy {
                max-width: 50ch;
                margin: 18px 0 0;
                color: var(--muted);
                font-size: 17px;
                line-height: 1.7;
            }

            .email-target {
                margin-top: 24px;
                padding: 16px 18px;
                border-left: 3px solid var(--primary);
                background: var(--surface-soft);
                font-weight: 700;
                overflow-wrap: anywhere;
            }

            .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 32px;
            }

            .button {
                min-height: 46px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border: 1px solid var(--primary);
                padding: 0 20px;
                color: white;
                background: var(--primary);
                font-weight: 750;
                text-decoration: none;
            }

            .button:hover {
                background: var(--primary-dark);
            }

            .button:active {
                transform: translateY(1px);
            }

            .button.secondary {
                color: var(--ink);
                border-color: var(--line);
                background: white;
            }

            .button.secondary:hover {
                background: var(--surface-soft);
            }

            .progress-track {
                width: 100%;
                height: 4px;
                margin-top: 34px;
                overflow: hidden;
                background: var(--line);
            }

            .progress-bar {
                width: 40%;
                height: 100%;
                background: var(--primary);
                animation: loading 1.3s ease-in-out infinite;
            }

            .login-form {
                display: grid;
                gap: 18px;
                margin-top: 26px;
            }

            .field {
                display: grid;
                gap: 8px;
            }

            .field label {
                font-weight: 750;
            }

            .field input {
                min-height: 48px;
                width: 100%;
                border: 1px solid #bac1cb;
                padding: 0 14px;
                color: var(--ink);
                background: white;
            }

            .field input:focus {
                outline: 3px solid rgba(37, 99, 235, 0.18);
                border-color: var(--focus);
            }

            .form-meta {
                display: flex;
                justify-content: space-between;
                gap: 18px;
                color: var(--muted);
                font-size: 14px;
            }

            .form-meta a {
                color: var(--primary-dark);
                font-weight: 700;
            }

            .toast-preview {
                position: fixed;
                top: 92px;
                right: 24px;
                width: min(360px, calc(100% - 32px));
                display: none;
                gap: 12px;
                align-items: start;
                padding: 16px;
                border: 1px solid #b8ddc7;
                border-left: 4px solid var(--success);
                background: white;
                box-shadow: 0 14px 34px rgba(32, 38, 50, 0.14);
                animation: toast-in 220ms ease-out both;
            }

            .toast-preview.visible {
                display: grid;
                grid-template-columns: auto 1fr auto;
            }

            .toast-preview strong,
            .toast-preview p {
                margin: 0;
            }

            .toast-preview p {
                margin-top: 4px;
                color: var(--muted);
                font-size: 14px;
                line-height: 1.5;
            }

            .toast-close {
                border: 0;
                color: var(--muted);
                background: transparent;
                font-size: 18px;
            }

            @keyframes loading {
                0% { transform: translateX(-110%); }
                55% { width: 58%; }
                100% { transform: translateX(250%); }
            }

            @keyframes toast-in {
                from { opacity: 0; transform: translateY(-8px); }
                to { opacity: 1; transform: translateY(0); }
            }

            @media (max-width: 760px) {
                .header-inner {
                    width: min(100% - 24px, 1120px);
                }

                .brand-text,
                .header-action {
                    display: none;
                }

                .demo-switcher {
                    grid-template-columns: repeat(2, 1fr);
                }

                main {
                    place-items: start center;
                    padding-top: 28px;
                }

                .auth-shell {
                    grid-template-columns: 1fr;
                }

                .context-panel {
                    padding: 28px 24px;
                    border-right: 0;
                    border-bottom: 1px solid var(--line);
                }

                .context-panel h2 {
                    max-width: none;
                    font-size: 26px;
                }

                .context-panel p {
                    margin-top: 10px;
                }

                .security-note {
                    display: none;
                }

                .status-panel {
                    min-height: 430px;
                    padding: 36px 24px;
                }

                .toast-preview {
                    top: 82px;
                    right: 16px;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                *,
                *::before,
                *::after {
                    scroll-behavior: auto !important;
                    animation-duration: 0.01ms !important;
                    animation-iteration-count: 1 !important;
                    transition-duration: 0.01ms !important;
                }
            }
        </style>
    </head>
    <body>
        <header class="site-header">
            <div class="header-inner">
                <button class="icon-button" aria-label="Quay lại" title="Quay lại">&#8592;</button>
                <div class="brand" aria-label="Mê Truyện Chữ">
                    <span class="brand-mark"><span>MC</span></span>
                    <span class="brand-text">Mê Truyện Chữ</span>
                </div>
                <a class="header-action" href="#">Trung tâm hỗ trợ</a>
            </div>
        </header>

        <nav class="demo-switcher" aria-label="Chọn trạng thái demo">
            <button data-view="pending" aria-selected="false">Đang xử lý</button>
            <button data-view="success" aria-selected="true">Thành công</button>
            <button data-view="error" aria-selected="false">Hết hạn</button>
            <button data-view="login" aria-selected="false">Đăng nhập</button>
        </nav>

        <main>
            <section class="auth-shell" aria-live="polite">
                <aside class="context-panel">
                    <p class="context-label">Bảo mật tài khoản</p>
                    <h2 id="context-title">Email mới đã sẵn sàng</h2>
                    <p id="context-copy">Phiên đăng nhập cũ sẽ được kết thúc để bảo vệ tài khoản của bạn.</p>
                    <p class="security-note">Mê Truyện Chữ không yêu cầu cung cấp mật khẩu qua email.</p>
                </aside>
                <div class="status-panel" id="status-panel" data-state="success"></div>
            </section>
        </main>

        <aside class="toast-preview visible" id="toast" role="status">
            <span aria-hidden="true">&#10003;</span>
            <div>
                <strong>Đổi email thành công</strong>
                <p>Các phiên đăng nhập cũ đang được làm mới.</p>
            </div>
            <button class="toast-close" aria-label="Đóng thông báo">&times;</button>
        </aside>

        <script>
            const views = {
                pending: {
                    contextTitle: "Đang kiểm tra liên kết",
                    contextCopy: "Vui lòng giữ nguyên trang này trong khi hệ thống xác nhận yêu cầu.",
                    state: "pending",
                    toast: false,
                    html: `
                        <div class="status-icon" aria-hidden="true">&#8635;</div>
                        <h1>Đang xác nhận email mới</h1>
                        <p class="status-copy">Hệ thống đang kiểm tra liên kết và cập nhật thông tin bảo mật. Quá trình này thường chỉ mất vài giây.</p>
                        <div class="email-target">cdat968@gmail.com</div>
                        <div class="progress-track" aria-label="Đang xử lý"><div class="progress-bar"></div></div>
                    `,
                },
                success: {
                    contextTitle: "Email mới đã sẵn sàng",
                    contextCopy: "Phiên đăng nhập cũ sẽ được kết thúc để bảo vệ tài khoản của bạn.",
                    state: "success",
                    toast: true,
                    html: `
                        <div class="status-icon" aria-hidden="true">&#10003;</div>
                        <h1>Đổi email thành công</h1>
                        <p class="status-copy">Từ bây giờ, hãy sử dụng email mới để đăng nhập. Bạn sẽ được chuyển tới trang đăng nhập sau vài giây.</p>
                        <div class="email-target">cdat968@gmail.com</div>
                        <div class="actions">
                            <a class="button" href="#">Đăng nhập ngay</a>
                            <a class="button secondary" href="#">Về trang chủ</a>
                        </div>
                    `,
                },
                error: {
                    contextTitle: "Liên kết không còn hiệu lực",
                    contextCopy: "Email hiện tại của bạn chưa bị thay đổi.",
                    state: "error",
                    toast: false,
                    html: `
                        <div class="status-icon" aria-hidden="true">!</div>
                        <h1>Không thể xác nhận email</h1>
                        <p class="status-copy">Liên kết đã hết hạn, đã được sử dụng hoặc đã bị thay thế bởi một yêu cầu đổi email mới hơn.</p>
                        <div class="actions">
                            <a class="button" href="#">Về bảo mật</a>
                            <button class="button secondary" type="button">Gửi lại liên kết</button>
                        </div>
                    `,
                },
                login: {
                    contextTitle: "Đăng nhập lại để tiếp tục",
                    contextCopy: "Thay đổi bảo mật đã kết thúc phiên cũ trên các thiết bị của bạn.",
                    state: "login",
                    toast: false,
                    html: `
                        <div class="status-icon" aria-hidden="true">&#8594;</div>
                        <h1>Đăng nhập</h1>
                        <p class="status-copy">Sử dụng email mới vừa xác nhận để tiếp tục.</p>
                        <form class="login-form">
                            <div class="field">
                                <label for="email">Email</label>
                                <input id="email" name="email" type="email" value="cdat968@gmail.com" />
                            </div>
                            <div class="field">
                                <label for="password">Mật khẩu</label>
                                <input id="password" name="password" type="password" placeholder="Nhập mật khẩu" />
                            </div>
                            <div class="form-meta">
                                <span>Email đã được cập nhật</span>
                                <a href="#">Quên mật khẩu?</a>
                            </div>
                            <button class="button" type="submit">Đăng nhập</button>
                        </form>
                    `,
                },
            };

            const panel = document.querySelector("#status-panel");
            const contextTitle = document.querySelector("#context-title");
            const contextCopy = document.querySelector("#context-copy");
            const toast = document.querySelector("#toast");
            const buttons = document.querySelectorAll("[data-view]");

            function render(viewName) {
                const view = views[viewName];
                panel.dataset.state = view.state;
                panel.innerHTML = view.html;
                contextTitle.textContent = view.contextTitle;
                contextCopy.textContent = view.contextCopy;
                toast.classList.toggle("visible", view.toast);
                buttons.forEach((button) => {
                    button.setAttribute("aria-selected", String(button.dataset.view === viewName));
                });
            }

            buttons.forEach((button) => button.addEventListener("click", () => render(button.dataset.view)));
            document.querySelector(".toast-close").addEventListener("click", () => toast.classList.remove("visible"));
            render("success");
        </script>
    </body>
</html>
